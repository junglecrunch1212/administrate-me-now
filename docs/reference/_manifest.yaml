# docs/reference/_manifest.yaml
#
# Version pin for the mirrored external documentation under docs/reference/.
# Each entry records the upstream source, the git commit SHA that was mirrored,
# and the date of the mirror. When an upstream doc changes in a way that
# affects an AdministrateMe invariant, a dedicated phase prompt updates both
# this manifest AND the affected invariants in the same commit.
#
# See docs/DECISIONS.md §D12 for the policy.

mirrored_at: "2026-04-22"
mirrored_by: "prompts/00.5 + 00.5b"
format_version: 1

sources:
  openclaw:
    upstream_repo: "openclaw/openclaw"
    upstream_path: "docs/"
    source_commit: "unknown"  # backfill from the prompt 00.5 run if needed
    local_path: "docs/reference/openclaw/"
    notes: "Primary OpenClaw documentation — source of the cheatsheet and all OpenClaw-boundary invariants."

  plaid:
